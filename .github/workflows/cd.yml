name: Krud CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  container_publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: api
            file: apps/api/Dockerfile
            image: krud-api
          - app: web
            file: apps/web/Dockerfile
            image: krud-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_hooks:
    runs-on: ubuntu-latest
    needs: container_publish
    steps:
      - name: Trigger API deploy hook
        if: ${{ secrets.DEPLOY_HOOK_API != '' }}
        run: curl -fsSL -X POST "$DEPLOY_HOOK_API"
        env:
          DEPLOY_HOOK_API: ${{ secrets.DEPLOY_HOOK_API }}

      - name: Trigger WEB deploy hook
        if: ${{ secrets.DEPLOY_HOOK_WEB != '' }}
        run: curl -fsSL -X POST "$DEPLOY_HOOK_WEB"
        env:
          DEPLOY_HOOK_WEB: ${{ secrets.DEPLOY_HOOK_WEB }}
