name: Krud CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/krud
  JWT_SECRET: ci-secret
  JWT_REFRESH_SECRET: ci-refresh-secret
  JWT_ACCESS_TTL: 900
  JWT_REFRESH_TTL: 604800
  ADMIN_EMAIL: admin@krud.local
  ADMIN_PASSWORD: Admin12345!
  VIEWER_EMAIL: viewer@krud.local
  VIEWER_PASSWORD: Viewer12345!
  DEVELOPER_EMAIL: developer@krud.local
  DEVELOPER_PASSWORD: Developer12345!
  E2E_API_URL: http://localhost:3001/api
  E2E_API_HEALTH_URL: http://localhost:3001/api/health

jobs:
  lint_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: lint_build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: krud
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d krud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations
        run: npm run db:migrate

      - name: Seed admin user
        run: npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
