name: Krud CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/krud
      JWT_SECRET: ci-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL: 604800
      ADMIN_EMAIL: admin@krud.local
      ADMIN_PASSWORD: Admin12345!
      E2E_API_URL: http://localhost:3001/api
      E2E_API_HEALTH_URL: http://localhost:3001/api/health
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: krud
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d krud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations
        run: npm run db:migrate

      - name: Seed admin user
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright
        run: npm run e2e
