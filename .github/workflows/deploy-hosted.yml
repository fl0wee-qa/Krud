name: Krud Deploy (Hosted)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hosted-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy hook configuration
        run: |
          if [ -z "${{ secrets.DEPLOY_HOOK_API }}" ] && [ -z "${{ secrets.DEPLOY_HOOK_WEB }}" ]; then
            echo "No deploy hooks configured. Set DEPLOY_HOOK_API and/or DEPLOY_HOOK_WEB repository secrets."
          else
            echo "Deploy hooks detected. Proceeding with hosted deploy jobs."
          fi

  deploy_api:
    needs: preflight
    if: ${{ secrets.DEPLOY_HOOK_API != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API deploy hook
        run: curl --fail --retry 3 --retry-delay 5 --show-error -X POST "${{ secrets.DEPLOY_HOOK_API }}"

  deploy_web:
    needs: preflight
    if: ${{ secrets.DEPLOY_HOOK_WEB != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger WEB deploy hook
        run: curl --fail --retry 3 --retry-delay 5 --show-error -X POST "${{ secrets.DEPLOY_HOOK_WEB }}"
